<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北医元火社团招新题目展示</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .group {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 8px;
            transition: background-color 0.2s;
        }
        .group.used {
            background-color: #f0f9ff;
            border-color: #b3e5fc;
        }
        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .group-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .group-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin: 0;
        }
        button {
            padding: 8px 16px;
            font-size: 14px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .images-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .image-wrapper {
            text-align: center;
            cursor: zoom-in;
        }
        .image-wrapper img {
            max-width: 300px;
            height: auto;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .image-wrapper img:hover {
            transform: scale(1.02);
        }
        .image-name {
            margin-top: 8px;
            font-size: 14px;
            color: #666;
        }

        /* 全屏预览样式 */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 4px;
        }
        #lightbox-close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>

    <div id="gallery"></div>

    <!-- 全屏预览容器 -->
    <div id="lightbox">
        <span id="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="Fullscreen Image">
    </div>

    <script>
        // ================= 已配置好的图片信息 =================
        // 图片文件夹路径
        const imagePath = "./";
        // 所有图片文件名
        const imageFiles = [
            "1-0.jpg", "1-1.jpg", "1-2.jpg", "1-3.jpg",
            "2-0.jpg", "2-1.jpg", "2-2.jpg",
            "3-0.jpg", "3-1.jpg",
            "4-0.jpg", "4-1.jpg",
            "5-0.jpg", "5-1.jpg",
            "6-0.jpg", "6-1.jpg",
            "7-0.jpg", "7-1.jpg", "7-2.png", "7-3.jpg", "7-4.jpg",
            "8-0.jpg", "8-1.jpg",
            "9-0.jpg", "9-1.jpg",
            "10-0.jpg", "10-1.jpg",
            "11-0.jpg", "11-1.jpg",
            "12-0.jpg", "12-1.jpg",
            "13-0.jpg", "13-1.jpg",
            "14-0.jpg", "14-1.jpg",
            "15-0.jpg", "15-1.jpg",
            "16-0.jpg", "16-1.jpg",
            "17-0.jpg", "17-1.jpg",
            "18-0.jpg", "18-1.jpg",
            "19-0.jpg", "19-1.jpg",
            "20-0.jpg", "20-1.jpg",
            "21-0.jpg", "21-1.jpg",
            "22-0.jpg", "22-1.jpg",
            "23-0.jpg", "23-1.jpg",
            "24-0.jpg", "24-1.jpg",
            "25-0.jpg", "25-1.jpg",
            "26-0.jpg", "26-1.jpg",
            "27-0.jpg", "27-1.jpg",
            "28-0.jpg", "28-1.jpg", "28-2.jpg",
            "29-0.jpg", "29-1.jpg",
            "30-0.jpg", "30-1.jpg",
            "31-0.jpg", "31-1.jpg",
            "32-0.jpg", "32-1.jpg",
            "33-0.jpg", "33-1.jpg",
            "34-0.jpg", "34-1.jpg",
            "35-0.jpg", "35-1.jpg", "35-2.jpg", "35-3.jpg",
            "36-0.jpg", "36-1.jpg",
            "37-0.jpg", "37-1.jpg",
            "38-0.jpg", "38-1.jpg", "38-2.png",
            "39-0.jpg", "39-1.jpg"
        ];
        // ======================================================

        const gallery = document.getElementById('gallery');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxClose = document.getElementById('lightbox-close');

        // 存储每个组的状态: { showHint: boolean, checked: boolean }
        let groupStates = {};
        const STORAGE_KEY = 'imageGalleryGroupStates';

        // 从 localStorage 加载状态
        function loadStates() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                groupStates = JSON.parse(saved);
            }
        }

        // 保存状态到 localStorage
        function saveStates() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(groupStates));
        }

        // 解析文件名
        function parseFilename(filename) {
            const nameWithoutExt = filename.replace(/\.[^/.]+$/, "");
            const parts = nameWithoutExt.split('-');
            if (parts.length === 2) {
                return {
                    prefix: parts[0],
                    suffix: parseInt(parts[1]),
                    fullName: filename
                };
            }
            return null;
        }

        // 按前缀分组
        function groupImages(images) {
            const groups = {};
            images.forEach(file => {
                const parsed = parseFilename(file);
                if (parsed) {
                    if (!groups[parsed.prefix]) {
                        groups[parsed.prefix] = [];
                        // 初始化该组状态 (如果没有记录的话)
                        if (!groupStates[parsed.prefix]) {
                            groupStates[parsed.prefix] = { showHint: false, checked: false };
                        }
                    }
                    groups[parsed.prefix].push(parsed);
                }
            });
            return groups;
        }

        // 渲染画廊
        function renderGallery() {
            gallery.innerHTML = '';
            const groups = groupImages(imageFiles);

            Object.keys(groups).sort((a,b) => parseInt(a) - parseInt(b)).forEach(prefix => {
                const groupImages = groups[prefix];
                const hasHighSuffix = groupImages.some(img => img.suffix >= 2);
                const state = groupStates[prefix];

                // 创建分组容器
                const groupDiv = document.createElement('div');
                groupDiv.className = `group ${state.checked ? 'used' : ''}`;
                groupDiv.id = `group-${prefix}`;
                
                // 头部（复选框 + 标题 + 按钮）
                const header = document.createElement('div');
                header.className = 'group-header';
                
                // 左侧：复选框 + 标题
                const headerLeft = document.createElement('div');
                headerLeft.className = 'header-left';

                // 复选框
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'group-checkbox';
                checkbox.checked = state.checked;
                checkbox.title = '标记为已使用';
                checkbox.onchange = function() {
                    groupStates[prefix].checked = this.checked;
                    saveStates();
                    groupDiv.classList.toggle('used', this.checked);
                };

                const title = document.createElement('div');
                title.className = 'group-title';
                title.textContent = `第 ${prefix} 题`;

                headerLeft.appendChild(checkbox);
                headerLeft.appendChild(title);

                // 右侧：按钮
                const btn = document.createElement('button');
                btn.textContent = state.showHint ? "恢复题目" : "显示提示";
                btn.onclick = function() {
                    groupStates[prefix].showHint = !groupStates[prefix].showHint;
                    saveStates();
                    renderGallery();
                };

                header.appendChild(headerLeft);
                header.appendChild(btn);
                groupDiv.appendChild(header);

                // 图片容器
                const container = document.createElement('div');
                container.className = 'images-container';

                // 确定要显示的图片
                groupImages.forEach(img => {
                    let displayImg = null;

                    if (state.showHint) {
                        if (hasHighSuffix) {
                            if (img.suffix === 1 || img.suffix >= 2) displayImg = img;
                        } else {
                            if (img.suffix === 1) displayImg = img;
                        }
                    } else {
                        if (hasHighSuffix) {
                            if (img.suffix === 0 || img.suffix >= 2) displayImg = img;
                        } else {
                            if (img.suffix === 0) displayImg = img;
                        }
                    }

                    if (displayImg) {
                        const wrapper = document.createElement('div');
                        wrapper.className = 'image-wrapper';

                        const imgEl = document.createElement('img');
                        imgEl.src = imagePath + displayImg.fullName;
                        imgEl.alt = displayImg.fullName;
                        imgEl.loading = "lazy";
                        
                        // 点击打开全屏预览
                        imgEl.onclick = function() {
                            openLightbox(this.src);
                        }

                        const nameLabel = document.createElement('div');
                        nameLabel.className = 'image-name';
                        nameLabel.textContent = displayImg.fullName;

                        wrapper.appendChild(imgEl);
                        wrapper.appendChild(nameLabel);
                        container.appendChild(wrapper);
                    }
                });

                groupDiv.appendChild(container);
                gallery.appendChild(groupDiv);
            });
        }

        // 打开全屏预览
        function openLightbox(src) {
            lightbox.style.display = 'flex';
            lightboxImg.src = src;
        }

        // 关闭全屏预览
        function closeLightbox() {
            lightbox.style.display = 'none';
        }

        // 绑定关闭事件
        lightboxClose.onclick = closeLightbox;
        lightbox.onclick = function(e) {
            if (e.target === lightbox) closeLightbox();
        };
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && lightbox.style.display === 'flex') closeLightbox();
        });

        // 初始化
        loadStates();
        renderGallery();
    </script>
</body>
</html>
