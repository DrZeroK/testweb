            padding: 20px;

        }
        .group {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 8px;
            transition: background-color 0.2s;
        }
        .group.used {
            background-color: #f0f9ff;
            border-color: #b3e5fc;
        }
        .group.correct {
            background-color: #f0fff4;
            border-color: #95de64;
        }
        .group-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .group-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .group-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin: 0;
        }
        .answer-area {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .answer-select {
            padding: 7px 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            min-width: 280px;
        }
        .answer-select:disabled {
            background-color: #f5f5f5;
            cursor: not-allowed;
            color: #212529;
        }
        button {
            padding: 8px 16px;
            font-size: 14px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        button:hover:not(:disabled) {
            background-color: #0056b3;
        }
        .hint-btn {
            background-color: #28a745;
        }
        .hint-btn:hover:not(:disabled) {
            background-color: #218838;
        }
        .tip-btn {
            background-color: #ffc107;
            color: #212529;
        }
        .tip-btn:hover:not(:disabled) {
            background-color: #e0a800;
        }
        .question-tip {
            font-size: 14px;
            color: #856404;
            background-color: #fff3cd;
            padding: 5px 10px;
            border-radius: 4px;
            display: none;
        }
        .question-tip.show {
            display: block;
        }
        .answer-tip {
            font-size: 14px;
            font-weight: bold;
        }
        .tip-correct {
            color: #52c41a;
        }
        .tip-error {
            color: #ff4d4f;
        }
        .images-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
        }
        .image-wrapper {
            text-align: center;
            cursor: zoom-in;
        }
        .image-wrapper img {
            max-width: 300px;
            height: auto;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .image-wrapper img:hover {
            transform: scale(1.02);
        }
        .image-name {
            margin-top: 8px;
            font-size: 14px;
            color: #666;
        }

        /* 底部重置按钮样式 */
        .reset-area {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }
        .reset-btn {
            background-color: #dc3545;
            padding: 12px 30px;
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(220, 53, 69, 0.3);
        }
        .reset-btn:hover {
            background-color: #c82333;
        }

        /* 全屏预览样式 */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
            flex-direction: column;
        }
        /* 左右切换按钮 */
        .lightbox-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0,0,0,0.5);
            color: white;
            border: none;
            font-size: 40px;
            padding: 10px 20px;
            cursor: pointer;
            z-index: 10001;
            user-select: none;
            transition: background-color 0.3s;
            border-radius: 5px;
        }
        .lightbox-nav-btn:hover:not(:disabled) {
            background-color: rgba(0,0,0,0.9);
        }
        .lightbox-nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        #lightbox-prev {
            left: 20px;
        }
        #lightbox-next {
            right: 20px;
        }
        /* 灯箱顶部控制栏 */
        #lightbox-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 10000;
        }
        #lightbox-hint-btn {
            background-color: #28a745;
        }
        #lightbox-hint-btn:hover:not(:disabled) {
            background-color: #218838;
        }
        #lightbox img {
            max-width: 90%;
            max-height: 80%;
            object-fit: contain;
            border-radius: 4px;
            cursor: default;
        }
        #lightbox-close {
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            line-height: 1;
        }
        #lightbox-info {
            color: #ccc;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>

            "34": "阿片类药物，主打镇咳、镇痛",
            "35": "阿片类强效镇痛药，癌痛常用",
            "36": "阿片类镇痛药，俗称杜冷丁",
            "37": "阿片类强效镇痛药，麻醉辅助用药",
            "38": "M胆碱受体拮抗剂，解救有机磷中毒",
            "39": "α糖苷酶抑制剂，降糖，主打降餐后血糖"
        };

        // ================= 全局变量 =================
        const gallery = document.getElementById('gallery');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxClose = document.getElementById('lightbox-close');
        const lightboxHintBtn = document.getElementById('lightbox-hint-btn');
        const lightboxInfo = document.getElementById('lightbox-info');
        const lightboxPrev = document.getElementById('lightbox-prev');
        const lightboxNext = document.getElementById('lightbox-next');
        const resetAllBtn = document.getElementById('resetAllBtn');

        // 状态管理
        let groupStates = {}; // 每个题组的状态
        let usedOptions = []; // 已经被答对的选项
        let currentLightboxPrefix = null;
        let currentImageData = null;
        let currentDisplayList = [];
        let currentIndex = 0;

        // 本地存储key
        const STORAGE_KEY_GROUP = 'quizGroupStates';
        const STORAGE_KEY_USED = 'quizUsedOptions';

        // ================= 基础工具函数 =================
        // 加载本地存储的状态
        function loadStates() {
            const savedGroups = localStorage.getItem(STORAGE_KEY_GROUP);
            if (savedGroups) groupStates = JSON.parse(savedGroups);
            
            const savedUsed = localStorage.getItem(STORAGE_KEY_USED);
            if (savedUsed) usedOptions = JSON.parse(savedUsed);
        }

        // 保存状态到本地存储
        function saveStates() {
            localStorage.setItem(STORAGE_KEY_GROUP, JSON.stringify(groupStates));
            localStorage.setItem(STORAGE_KEY_USED, JSON.stringify(usedOptions));
        }

        // 解析文件名
        function parseFilename(filename) {
            const nameWithoutExt = filename.replace(/\.[^/.]+$/, "");
            const parts = nameWithoutExt.split('-');
            if (parts.length === 2) {
                return {
                    prefix: parts[0],
                    suffix: parseInt(parts[1]),
                    fullName: filename
                };
            }
            return null;
        }

        // 按前缀分组图片
        function groupImages(images) {
            const groups = {};
            images.forEach(file => {
                const parsed = parseFilename(file);
                if (parsed) {
                    if (!groups[parsed.prefix]) {
                        groups[parsed.prefix] = [];
                        // 初始化题组状态
                        if (!groupStates[parsed.prefix]) {
                            groupStates[parsed.prefix] = {
                                showHint: false,
                                checked: false,
                                selectedOption: '',
                                isAnswered: false,
                                isCorrect: false
                            };
                        }
                    }
                    groups[parsed.prefix].push(parsed);
                }
            });
            return groups;
        }

        // 获取某个题组当前应显示的图片列表
        function getDisplayListForGroup(prefix) {
            const groups = groupImages(imageFiles);
            const groupImagesArr = groups[prefix];
            const state = groupStates[prefix];
            const hasHighSuffix = groupImagesArr.some(img => img.suffix >= 2);
            
            const list = [];
            groupImagesArr.forEach(img => {
                let shouldDisplay = false;
                if (state.showHint) {
                    shouldDisplay = hasHighSuffix ? (img.suffix === 1 || img.suffix >= 2) : (img.suffix === 1);
                } else {
                    shouldDisplay = hasHighSuffix ? (img.suffix === 0 || img.suffix >= 2) : (img.suffix === 0);
                }
                if (shouldDisplay) list.push(img);
            });
            return list;
        }

        // ================= 答题相关函数 =================
        // 提交答案
        function submitAnswer(prefix) {
            const state = groupStates[prefix];
            const selected = state.selectedOption;
            const correct = correctAnswers[prefix];

            if (!selected) return;

            if (selected === correct) {
                // 答对了
                state.isAnswered = true;
                state.isCorrect = true;
                state.checked = true; // 自动勾选标记框
                // 把选项加入已使用列表
                if (!usedOptions.includes(selected)) {
                    usedOptions.push(selected);
                }
                saveStates();
                renderGallery();
            } else {
                // 答错了
                state.isAnswered = true;
                state.isCorrect = false;
                saveStates();
                renderGallery();
            }
        }

        // ================= 重置进度函数 =================
        function resetAllProgress() {
            if (confirm('确定要重置所有答题进度吗？这将清除所有已选答案、配对记录和勾选状态，此操作不可恢复！')) {
                // 清空本地存储
                localStorage.removeItem(STORAGE_KEY_GROUP);
                localStorage.removeItem(STORAGE_KEY_USED);
                // 重置内存中的状态
                groupStates = {};
                usedOptions = [];
                // 重新加载并渲染
                loadStates();
                renderGallery();
                alert('进度已重置！');
            }
        }

        // ================= 灯箱相关函数 =================
        function updateLightboxContent() {
            if (currentDisplayList.length === 0) return;
            
            const data = currentDisplayList[currentIndex];
            lightboxImg.src = imagePath + data.fullName;
            lightboxInfo.textContent = `第 ${data.prefix} 题 - ${data.fullName} (${currentIndex + 1}/${currentDisplayList.length})`;
            currentImageData = data;
            currentLightboxPrefix = data.prefix;

            lightboxPrev.disabled = currentIndex === 0;
            lightboxNext.disabled = currentIndex === currentDisplayList.length - 1;
            updateLightboxButton();
        }

        function updateLightboxButton() {
            if (!currentLightboxPrefix) return;
            const state = groupStates[currentLightboxPrefix];
            lightboxHintBtn.textContent = state.showHint ? "恢复原始视图" : "显示化学式";
        }

        function openLightbox(imgData, displayList) {
            currentDisplayList = displayList;
            currentIndex = displayList.findIndex(i => i.fullName === imgData.fullName);
            currentIndex = currentIndex === -1 ? 0 : currentIndex;

            lightbox.style.display = 'flex';
            updateLightboxContent();
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
            currentLightboxPrefix = null;
            currentImageData = null;
            currentDisplayList = [];
            currentIndex = 0;
        }

        // ================= 渲染函数 =================
        function renderGallery() {
            gallery.innerHTML = '';
            const groups = groupImages(imageFiles);

            // 按题号从小到大排序
            Object.keys(groups).sort((a,b) => parseInt(a) - parseInt(b)).forEach(prefix => {
                const groupImagesArr = groups[prefix];
                const state = groupStates[prefix];
                const displayList = getDisplayListForGroup(prefix);
                // 每题只展示固定的 4 个选项，并确保包含正确答案
                const correct = correctAnswers[prefix];
                let availableOptions = (optionsByQuestion[prefix] || [correct]).slice(0, 4);
                if (!availableOptions.includes(correct)) {
                    // 强制把正确答案塞进选项里（并替换最后一个）
                    availableOptions[availableOptions.length - 1] = correct;
                }
                // 兼容历史已选项：若本地存储的 selectedOption 不在这 4 个里，用它替换最后一个
                if (state.selectedOption && !availableOptions.includes(state.selectedOption)) {
                    const correctIndex = availableOptions.indexOf(correct);
                    // 不允许覆盖正确答案；优先替换最后一个，否则替换第一个
                    const replaceIndex = correctIndex === availableOptions.length - 1 ? 0 : availableOptions.length - 1;
                    availableOptions[replaceIndex] = state.selectedOption;
                }

                // 创建题组容器
                const groupDiv = document.createElement('div');
                groupDiv.className = `group ${state.checked ? 'used' : ''} ${state.isCorrect ? 'correct' : ''}`;
                
                // 头部区域
                const header = document.createElement('div');
                header.className = 'group-header';
                
                // 左侧：复选框 + 标题
                const headerLeft = document.createElement('div');
                headerLeft.className = 'header-left';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'group-checkbox';
                checkbox.checked = state.checked;
                checkbox.disabled = state.isCorrect; // 答对后自动锁定勾选框
                checkbox.onchange = function() {
                    groupStates[prefix].checked = this.checked;
                    saveStates();
                    groupDiv.classList.toggle('used', this.checked);
                };

                const title = document.createElement('div');
                title.className = 'group-title';
                title.textContent = `第 ${prefix} 题`;

                headerLeft.appendChild(checkbox);
                headerLeft.appendChild(title);

                // 答题区域
                const answerArea = document.createElement('div');
                answerArea.className = 'answer-area';

                // 下拉选择框
                const select = document.createElement('select');
                select.className = 'answer-select';
                select.disabled = state.isCorrect; // 答对后锁定选择框

                // 先添加空选项
                const emptyOption = document.createElement('option');
                emptyOption.value = '';
                emptyOption.textContent = '请选择答案';
                select.appendChild(emptyOption);

                // 再填充所有可用选项
                availableOptions.forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.textContent = opt;
                    select.appendChild(option);
                });

                // 【修复】最后设置选中值，确保选项已存在
                select.value = state.selectedOption;

                // 选择选项后实时更新提交按钮状态
                select.onchange = function() {
                    groupStates[prefix].selectedOption = this.value;
                    saveStates();
                    // 实时更新按钮禁用状态
                    submitBtn.disabled = state.isCorrect || !this.value;
                };

                // 提交按钮
                const submitBtn = document.createElement('button');
                submitBtn.textContent = '提交答案';
                submitBtn.disabled = state.isCorrect || !state.selectedOption;
                submitBtn.onclick = function(e) {
                    e.stopPropagation();
                    submitAnswer(prefix);
                };

                // 图片提示按钮
                const imgHintBtn = document.createElement('button');
                imgHintBtn.className = 'hint-btn';
                imgHintBtn.textContent = state.showHint ? "恢复原始视图" : "显示化学式";
                imgHintBtn.onclick = function(e) {
                    e.stopPropagation();
                    groupStates[prefix].showHint = !groupStates[prefix].showHint;
                    saveStates();
                    renderGallery();
                };

                // 题目小提示按钮
                const questionTipBtn = document.createElement('button');
                questionTipBtn.className = 'tip-btn';
                questionTipBtn.textContent = '题目小提示';
                const questionTipText = document.createElement('div');
                questionTipText.className = 'question-tip';
                questionTipText.textContent = questionHints[prefix];
                questionTipBtn.onclick = function(e) {
                    e.stopPropagation();
                    questionTipText.classList.toggle('show');
                };

                // 答题提示文本
                const tipText = document.createElement('div');
                tipText.className = 'answer-tip';
                if (state.isAnswered) {
                    tipText.textContent = state.isCorrect ? '配对正确' : '配对错误';
                    tipText.classList.add(state.isCorrect ? 'tip-correct' : 'tip-error');
                }

                // 组装答题区域
                answerArea.appendChild(select);
                answerArea.appendChild(submitBtn);
                answerArea.appendChild(imgHintBtn);
                answerArea.appendChild(questionTipBtn);
                answerArea.appendChild(questionTipText);
                answerArea.appendChild(tipText);

                // 组装头部
                header.appendChild(headerLeft);
                header.appendChild(answerArea);
                groupDiv.appendChild(header);

                // 图片容器
                const container = document.createElement('div');
                container.className = 'images-container';

                displayList.forEach(img => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'image-wrapper';

                    const imgEl = document.createElement('img');
                    imgEl.src = imagePath + img.fullName;
                    imgEl.alt = img.fullName;
                    imgEl.loading = "lazy";
                    
                    imgEl.onclick = function(e) {
                        e.stopPropagation();
                        openLightbox(img, displayList);
                    }

                    const nameLabel = document.createElement('div');
                    nameLabel.className = 'image-name';
                    nameLabel.textContent = img.fullName;

                    wrapper.appendChild(imgEl);
                    wrapper.appendChild(nameLabel);
                    container.appendChild(wrapper);
                });

                groupDiv.appendChild(container);
                gallery.appendChild(groupDiv);
            });
        }

        // ================= 事件绑定 =================
        // 绑定重置按钮事件
        resetAllBtn.onclick = resetAllProgress;

        // 灯箱关闭事件
        lightboxClose.onclick = closeLightbox;
        lightbox.onclick = function(e) {
            if (e.target === lightbox) closeLightbox();
        };

        // 灯箱导航事件
        lightboxPrev.onclick = function(e) {
            e.stopPropagation();
            if (currentIndex > 0) {
                currentIndex--;
                updateLightboxContent();
            }
        };

        lightboxNext.onclick = function(e) {
            e.stopPropagation();
            if (currentIndex < currentDisplayList.length - 1) {
                currentIndex++;
                updateLightboxContent();
            }
        };

        // 灯箱内提示按钮
        lightboxHintBtn.onclick = function(e) {
            e.stopPropagation();
            if (!currentLightboxPrefix) return;

            groupStates[currentLightboxPrefix].showHint = !groupStates[currentLightboxPrefix].showHint;
            saveStates();
            renderGallery();

            currentDisplayList = getDisplayListForGroup(currentLightboxPrefix);
            const newIdx = currentDisplayList.findIndex(i => i.suffix === currentImageData.suffix);
            currentIndex = newIdx !== -1 ? newIdx : 0;
            if (currentIndex >= currentDisplayList.length) currentIndex = Math.max(0, currentDisplayList.length - 1);

            updateLightboxContent();
        };

        // 键盘事件
        document.addEventListener('keydown', function(e) {
            if (lightbox.style.display !== 'flex') return;

            if (e.key === 'Escape') {
                closeLightbox();
            } else if (e.key === 'ArrowLeft') {
                if (currentIndex > 0) {
                    currentIndex--;
                    updateLightboxContent();
                }
            } else if (e.key === 'ArrowRight') {
                if (currentIndex < currentDisplayList.length - 1) {
                    currentIndex++;
                    updateLightboxContent();
                }
            }
        });

        // ================= 初始化 =================
        loadStates();
        renderGallery();
    </script>
</body>
</html>
